---
# Helm values for the External Secrets Operator (ESO) platform component,
# consumed by applications/external-secrets.yaml (multi-source $values ref).
#
# ESO syncs secrets from Google Secret Manager into Kubernetes Secret objects.
# It authenticates to GSM as the `external-secrets` GSA via GKE Workload
# Identity (no JSON key); the GSA, its WI binding for
# `external-secrets/external-secrets`, and the project-level
# roles/secretmanager.secretAccessor binding are provisioned in platform-iac
# (terraform/iam, S1-08). The ClusterSecretStore that selects this identity
# lives in external-secrets/clustersecretstores/.
#
# CRDs install with the chart (installCRDs: true is pinned explicitly below)
# and are applied server-side by the Argo CD Application, keeping the large
# ESO CRDs clear of the 256KB client-side annotation limit.

# Pin CRD installation explicitly so a future chart-default change cannot
# silently render the ClusterSecretStore CRD out of the release — same
# forward-safety reasoning as the chart-version pin
# (platform/CONTRIBUTING.md § Tool Versions in CI), and matches the explicit
# crds.enabled/crds.keep pin in values/cert-manager.yaml.
installCRDs: true

# Workload Identity: bind the chart's KSA to the platform-iac-provisioned GSA.
# The KSA name `external-secrets` matches the iam module's
# external_secrets_ksa_name default (platform-iac/terraform/iam/variables.tf).
serviceAccount:
  name: external-secrets
  annotations:
    iam.gke.io/gcp-service-account: external-secrets@dotted-axle-495612-f4.iam.gserviceaccount.com

# Sized for the academic-scope platform. Single replica per component is the
# chart default. CPU is left without a limit to avoid throttling; memory has a
# hard limit to bound the OOM blast radius on the shared cluster — same pattern
# as the other platform components (cert-manager, traefik, cloudnative-pg).
resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    memory: 128Mi

webhook:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

certController:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
