---
# Cluster-wide SecretStore backing every ExternalSecret in the platform onto
# Google Secret Manager.
#
# Authentication is GKE Workload Identity, no static credentials: the store
# references the ESO Kubernetes ServiceAccount `external-secrets/external-secrets`
# via serviceAccountRef. That KSA carries the
# `iam.gke.io/gcp-service-account: external-secrets@...` annotation (set in
# values/external-secrets.yaml), so ESO impersonates the `external-secrets` GSA,
# which holds project-level roles/secretmanager.secretAccessor (platform-iac
# terraform/iam, S1-08).
#
# clusterLocation/clusterName identify the GKE cluster for the Workload Identity
# token exchange (terraform/cluster: zonal cluster `platform-cluster` in
# europe-west1-b). projectID is the GSM project the secrets live in.
#
# Synced by the sibling Application
# applications/external-secrets-clustersecretstore.yaml, which depends on the
# ClusterSecretStore CRD installed by applications/external-secrets.yaml.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: dotted-axle-495612-f4
      auth:
        workloadIdentity:
          clusterLocation: europe-west1-b
          clusterName: platform-cluster
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
