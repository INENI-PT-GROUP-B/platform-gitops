name: Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pipx install yamllint==1.38.0
      - name: Run yamllint
        run: yamllint .

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint
        run: npx --yes markdownlint-cli2@0.22.1 "**/*.md" "#node_modules"
