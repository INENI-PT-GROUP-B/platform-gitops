---
# ESO ExternalSecret materialising the Grafana admin credentials into the
# `monitoring` namespace, consumed by kube-prometheus-stack's Grafana via
# `grafana.admin.existingSecret` (values/kube-prometheus-stack.yaml).
#
# Source: the GSM secret `grafana-admin` in project dotted-axle-495612-f4,
# pulled through the cluster-wide `gcp-secret-manager` ClusterSecretStore
# (external-secrets/clustersecretstores/gcp-secret-manager.yaml), which auth's
# via Workload Identity — no static credentials. Same store every other
# platform/tenant ExternalSecret uses.
#
# The GSM secret must hold a JSON object with both keys, e.g.
#   {"admin-user": "admin", "admin-password": "<random>"}
# `dataFrom.extract` maps those JSON properties straight onto the K8s Secret
# data keys admin-user / admin-password, matching the chart's userKey /
# passwordKey. Rotating the password = adding a new GSM secret version; ESO
# refreshes within refreshInterval and Grafana picks it up on next restart.
#
# OPEN ITEM (flag for review, ties into the one-click constraint): seeding the
# GSM secret `grafana-admin` is an out-of-band, one-time step. Decide whether
# bootstrap.sh seeds it from bootstrap.env (keeps "no manual click after
# bootstrap kickoff" intact) or whether it is a documented persistent-resource
# seed like the DNS zone / state bucket. Coordinate with the bootstrap owner
# (mr) — this is not resolved by this manifest alone.
#
# Synced by applications/kube-prometheus-stack-secrets.yaml, which depends on
# the ESO `ExternalSecret` CRD (applications/external-secrets.yaml) and the
# `monitoring` namespace (created by applications/kube-prometheus-stack.yaml).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: grafana-admin
