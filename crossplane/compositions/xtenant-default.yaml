---
# Composition: xtenant-default
#
# First Composition implementing the XTenant XRD. Shared file: subsequent
# Sprint 3 tasks (S3-03 NetworkPolicies, S3-04 CloudNativePG, S3-05 BasicAuth,
# S3-06 Helm Release) extend the same resources[] list rather than adding new
# Composition files — Crossplane v1.x P&T selects at most one Composition per
# XR by default, so a separate file would shadow this one.
#
# This file ships:
#   - S3-02 base resources: Namespace (tenant-<spec.name>), ResourceQuota
#     (tier-dependent quantities), LimitRange (per-container defaults; max
#     tier-dependent).
#   - S3-03 NetworkPolicies (per tenant): default-deny ingress, default-deny
#     egress with DNS allow to kube-system, permissive in-namespace app ↔ DB
#     on TCP 5432, and allow ingress from the traefik namespace to app pods
#     on TCP 80 / 3000.
#   - S3-04 CloudNativePG Cluster (per tenant): a single-instance
#     postgresql.cnpg.io/v1 Cluster named `<spec.name>-cluster` in
#     tenant-<spec.name>. CNPG auto-generates the `<spec.name>-cluster-app`
#     credentials Secret (key `uri`), which the S3-06 Release wires into the
#     backend's DATABASE_URL. Backups are deferred — see the Resource 16
#     comment.
#   - S3-05 BasicAuth + GHCR pull: ESO Password generator + Sprig htpasswd
#     ExternalSecret (crossplane-system) → Crossplane Secret + SecretVersion
#     via provider-gcp-secretmanager (GSM `tenant-<spec.name>-basicauth-htpasswd`)
#     → ExternalSecret in tenant-ns materialising the K8s Secret with the
#     `users` key → Traefik BasicAuth Middleware referencing it. A second
#     ExternalSecret materialises the shared `shared-ghcr-pull-secret` from
#     GSM into each tenant-ns as `ghcr-pull-secret` (dockerconfigjson) for
#     the private frontend image pull. The shared GSM entry is seeded by
#     INENI-PT-GROUP-B/platform-iac#55.
#   - S3-06 Helm Release: a `helm.crossplane.io/v1beta1 Release` rendering
#     `ghcr.io/ineni-pt-group-b/app-chart` into the tenant namespace with the
#     central image tags from the `tenant-app-defaults` ConfigMap in
#     crossplane-system (synced from `values/app-version.yaml` by Argo CD).
#     Per-tenant `spec.imageTagOverride.{backend,frontend}` overrides win
#     over the central tags because they are applied as later `set[]`
#     overrides; the chart is a public OCI artefact, so no chart pull
#     secret is required.
#
# All Kubernetes resources are rendered via provider-kubernetes
# (kubernetes.crossplane.io/v1alpha2 Object) using ProviderConfig "default"
# (InjectedIdentity, cluster-admin RBAC; see crossplane/providers/
# provider-config-kubernetes.yaml). The S3-05 GSM Secret + SecretVersion
# use provider-gcp-secretmanager directly via its
# `secretmanager.gcp.upbound.io` CRDs (architecture-decisions.md § Crossplane
# providers states `secret.gcp.upbound.io` — that's the wrong subdomain;
# verified against v2.5.0 source examples and noted in the follow-up
# doc-sync PR), authenticated through the `provider-gcp` DRC's KSA / GSA
# pair set up in S1-08 + S2-10.
#
# Tier semantics: spec.tier (small|medium) drives the ResourceQuota quantities
# and LimitRange.max per container; defaultRequest/default/min stay constant
# across tiers. See platform/docs/claude/architecture-decisions.md
# § Multi-tenancy § Tiering and platform-gitops#38 scope.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xtenant-default
  labels:
    crossplane.io/xrd: xtenants.platform.fhuebung.lol
spec:
  compositeTypeRef:
    apiVersion: platform.fhuebung.lol/v1alpha1
    kind: XTenant

  resources:
    # -----------------------------------------------------------------------
    # 1. Namespace `tenant-<spec.name>`
    # -----------------------------------------------------------------------
    - name: namespace
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: v1
              kind: Namespace
              metadata:
                # patched from spec.name → "tenant-<name>"
                name: ""
                labels:
                  # patched from spec.name (verbatim, no transform)
                  platform.fhuebung.lol/tenant: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.labels["platform.fhuebung.lol/tenant"]

    # -----------------------------------------------------------------------
    # 2. ResourceQuota — tier-mapped namespace-level caps
    # -----------------------------------------------------------------------
    - name: resource-quota
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: v1
              kind: ResourceQuota
              metadata:
                name: tenant-quota
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                # Base values mirror the small tier; medium overrides via
                # tier-map patches below.
                hard:
                  requests.cpu: "1"
                  requests.memory: 1Gi
                  limits.cpu: "2"
                  limits.memory: 2Gi
                  pods: "10"
                  persistentvolumeclaims: "2"
                  requests.storage: 10Gi
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["requests.cpu"]
          transforms:
            - type: map
              map:
                small: "1"
                medium: "4"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["requests.memory"]
          transforms:
            - type: map
              map:
                small: 1Gi
                medium: 4Gi
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["limits.cpu"]
          transforms:
            - type: map
              map:
                small: "2"
                medium: "8"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["limits.memory"]
          transforms:
            - type: map
              map:
                small: 2Gi
                medium: 8Gi
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["pods"]
          transforms:
            - type: map
              map:
                small: "10"
                medium: "30"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["persistentvolumeclaims"]
          transforms:
            - type: map
              map:
                small: "2"
                medium: "5"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["requests.storage"]
          transforms:
            - type: map
              map:
                small: 10Gi
                medium: 30Gi

    # -----------------------------------------------------------------------
    # 3. LimitRange — per-container defaults; max tier-dependent
    # -----------------------------------------------------------------------
    # defaultRequest/default/min are constant across tiers; only max varies.
    # Chart pods set their own resources explicitly, so these defaults act as
    # a safety net for ad-hoc pods that don't.
    - name: limit-range
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: v1
              kind: LimitRange
              metadata:
                name: tenant-limits
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                limits:
                  - type: Container
                    defaultRequest:
                      cpu: 50m
                      memory: 64Mi
                    default:
                      cpu: 250m
                      memory: 256Mi
                    min:
                      cpu: 10m
                      memory: 32Mi
                    # Base values mirror the small tier; medium overrides via
                    # tier-map patches below.
                    max:
                      cpu: 500m
                      memory: 512Mi
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.limits[0].max.cpu
          transforms:
            - type: map
              map:
                small: 500m
                medium: "1"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.limits[0].max.memory
          transforms:
            - type: map
              map:
                small: 512Mi
                medium: 1Gi

    # -----------------------------------------------------------------------
    # 4. NetworkPolicy — default-deny ingress
    # -----------------------------------------------------------------------
    # Empty podSelector matches all pods in the namespace. No ingress rules
    # = implicit deny for all inbound traffic. Inbound is unlocked
    # selectively by Resources 6 (in-namespace 5432) and 7 (Traefik → app).
    - name: netpol-default-deny-ingress
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: default-deny-ingress
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 5. NetworkPolicy — default-deny egress + DNS allow + HTTPS allow
    # -----------------------------------------------------------------------
    # Egress is default-denied with two explicit allows:
    # (a) DNS 53 to kube-system for in-cluster service discovery (e.g. the
    #     CNPG cluster service hostname).
    # (b) TCP 443 to any destination, primarily for the Kubernetes API
    #     server which lives on a ClusterIP (default/kubernetes Service)
    #     not selectable via namespaceSelector. CNPG's initdb pod reads
    #     its own Cluster CRD during bootstrap and dies on i/o timeout
    #     without this. Also covers future workloads that need external
    #     HTTPS access (CNPG → GCS backups in S3-04, GCP APIs, etc.).
    # Trade-off: tenant pods can reach arbitrary HTTPS endpoints, not
    # only the API server. Acceptable for soft multi-tenancy per
    # architecture-decisions.md § Multi-tenancy; an ipBlock rule on the
    # cluster master CIDR was rejected because the IP is not stable
    # across bootstrap.sh runs.
    - name: netpol-default-deny-egress-allow-dns
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: default-deny-egress-allow-dns
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector: {}
                policyTypes:
                  - Egress
                egress:
                  - to:
                      - namespaceSelector:
                          matchLabels:
                            kubernetes.io/metadata.name: kube-system
                    ports:
                      - protocol: UDP
                        port: 53
                      - protocol: TCP
                        port: 53
                  - ports:
                      - protocol: TCP
                        port: 443
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 6. NetworkPolicy — allow app ↔ DB on TCP 5432 inside the namespace
    # -----------------------------------------------------------------------
    # Permissive cross-cut: any pod in tenant-<name> can reach any other pod
    # in the same namespace on TCP 5432. Safe under soft multi-tenancy
    # because the only listener on 5432 in the namespace is the CNPG cluster
    # Service. Decouples this task from S3-04's eventual DB pod-selector
    # convention; a cleanup follow-up can tighten with cnpg.io/cluster=...
    # labels once S3-04 lands.
    - name: netpol-allow-app-to-db
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: allow-app-to-db
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
                  - Egress
                ingress:
                  - from:
                      - podSelector: {}
                    ports:
                      - protocol: TCP
                        port: 5432
                egress:
                  - to:
                      - podSelector: {}
                    ports:
                      - protocol: TCP
                        port: 5432
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 7. NetworkPolicy — allow ingress from the traefik namespace to app pods
    # -----------------------------------------------------------------------
    # Traefik (in the `traefik` namespace) terminates ingress and reaches app
    # pods on the chart's service ports: TCP 80 (frontend), TCP 3000
    # (backend). Port 5432 is intentionally absent — Traefik never reaches
    # the DB even though the pod selector is empty.
    - name: netpol-allow-traefik-to-app
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: allow-traefik-to-app
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
                ingress:
                  - from:
                      - namespaceSelector:
                          matchLabels:
                            kubernetes.io/metadata.name: traefik
                    ports:
                      - protocol: TCP
                        port: 80
                      - protocol: TCP
                        port: 3000
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 7b. NetworkPolicy — CNPG operator probe + GKE metadata-server egress
    # -----------------------------------------------------------------------
    # Scoped to the CNPG instance pods via the operator-managed
    # cnpg.io/cluster label (Exists match — no per-tenant patch needed).
    # Ingress: the operator in cnpg-system must reach every instance pod
    # on TCP 8000 (status probe) and 5432 per the CNPG networking docs;
    # without this every Cluster reports "Instance Status Extraction
    # Error: HTTP communication issue" and failover orchestration stalls.
    # Egress: barman-cloud with `gkeEnvironment: true` obtains ADC tokens
    # and the project id from the GKE metadata server. On Dataplane V2
    # (pinned via datapath_provider in platform-iac) that means TCP 80 to
    # 169.254.169.254/32 per Google's Workload Identity guidance (a
    # Dataplane V1 cluster would need 169.254.169.252/32:988 instead).
    # The earlier ipBlock rejection (master CIDR, unstable across
    # bootstraps) does not apply: this is a fixed link-local IP.
    # Refs platform-gitops#91.
    - name: netpol-allow-cnpg-operator
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: allow-cnpg-operator
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector:
                  matchExpressions:
                    - key: cnpg.io/cluster
                      operator: Exists
                policyTypes:
                  - Ingress
                  - Egress
                ingress:
                  - from:
                      - namespaceSelector:
                          matchLabels:
                            kubernetes.io/metadata.name: cnpg-system
                    ports:
                      - protocol: TCP
                        port: 8000
                      - protocol: TCP
                        port: 5432
                egress:
                  - to:
                      - ipBlock:
                          cidr: 169.254.169.254/32
                    ports:
                      - protocol: TCP
                        port: 80
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 8. Password generator — ESO Password CR in crossplane-system
    # -----------------------------------------------------------------------
    # Config CR consumed by resource 9 via dataFrom.sourceRef. ESO calls the
    # generator at ExternalSecret reconciliation time to produce a `password`
    # key in the template context — the Password CR itself does not own a
    # separate K8s Secret. Resource 9's Sprig htpasswd template then hashes
    # that value into the htpasswd line stored in the target Secret.
    #
    # Re-onboarding a tenant (XR delete + recreate) or rebuilding the cluster
    # produces a fresh random password — accepted trade-off, since the ADR
    # § Secrets management does not promise persistence for the BasicAuth
    # secret (unlike the DNS zone or state bucket). length 32 / no symbols
    # is a deliberate choice for log-readability; bcrypt caps input at 72
    # bytes so deeper headroom is unnecessary.
    - name: basicauth-password-generator
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: generators.external-secrets.io/v1alpha1
              kind: Password
              metadata:
                # patched from spec.name → "tenant-<name>-password-gen"
                name: ""
                namespace: crossplane-system
              spec:
                length: 32
                digits: 8
                symbols: 0
                noUpper: false
                allowRepeat: true
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-password-gen"

    # -----------------------------------------------------------------------
    # 9. htpasswd ExternalSecret — bcrypt via Sprig htpasswd template
    # -----------------------------------------------------------------------
    # Consumes the Password generator from resource 8 (key `password`) and
    # renders the htpasswd line `admin:$2a$...` into a K8s Secret with the
    # `users` key — the format Traefik's BasicAuth Middleware expects.
    # This Secret in crossplane-system is the source resource 11 reads to
    # write the SecretVersion into GSM. ESO templates expose the full Sprig
    # function set; `htpasswd "user" "pwd"` is Sprig's bcrypt-hashed htpasswd
    # generator (returns the `user:$2a$10$...` line directly).
    # refreshInterval 0 = run once; the generator's output only changes on
    # cluster rebuild, refreshing here would be wasted work.
    - name: basicauth-htpasswd-source
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                # patched from spec.name → "tenant-<name>-htpasswd-source"
                name: ""
                namespace: crossplane-system
              spec:
                refreshInterval: "0"
                target:
                  # patched from spec.name → "tenant-<name>-htpasswd-source"
                  name: ""
                  creationPolicy: Owner
                  template:
                    engineVersion: v2
                    data:
                      users: |-
                        {{ htpasswd "admin" .password "bcrypt" }}
                      # Plaintext key consumed by resource 11b to seed the
                      # `tenant-<name>-basicauth-password` GSM SecretVersion
                      # for operator retrieval (see #76). Traefik continues
                      # to read only `users` (resource 12 → 14).
                      password: '{{ .password }}'
                dataFrom:
                  - sourceRef:
                      generatorRef:
                        apiVersion: generators.external-secrets.io/v1alpha1
                        kind: Password
                        # patched from spec.name → "tenant-<name>-password-gen"
                        name: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-htpasswd-source"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.target.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-htpasswd-source"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.dataFrom[0].sourceRef.generatorRef.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-password-gen"

    # -----------------------------------------------------------------------
    # 10. GSM Secret — container (provider-gcp-secretmanager)
    # -----------------------------------------------------------------------
    # Creates the Google Secret Manager secret container that holds the
    # tenant's htpasswd. Idempotent by external-name: a cluster rebuild
    # re-adopts the existing GSM container instead of recreating it.
    # deletionPolicy: Orphan keeps the GSM container after the XR is deleted,
    # so a re-onboarded tenant of the same name can be granted a fresh
    # password version without losing audit history. Replication: automatic
    # (Google chooses regions) — the v1beta1 CRD spells this as
    # `replication[].auto: [{}]`; v1beta2 uses a flat `replication.automatic`
    # form. We stay on v1beta1 because its `secretDataSecretRef` shape on
    # the SecretVersion is the verified contract.
    # GSM secret IDs must match `^[a-zA-Z][a-zA-Z0-9_-]{0,254}$` — slashes
    # are not allowed, so the documented `tenant-<name>/basicauth-htpasswd`
    # form is realised with dashes here; doc-sync PR to follow.
    - name: gsm-basicauth-secret
      base:
        apiVersion: secretmanager.gcp.upbound.io/v1beta1
        kind: Secret
        metadata:
          # `purpose` disambiguates this GSM Secret from the parallel
          # `gsm-basicauth-password-secret` (resource 10b) when the
          # SecretVersion (resource 11) picks it via matchLabels —
          # matchControllerRef alone is ambiguous with two sibling
          # GSM Secrets in the same XR.
          labels:
            purpose: basicauth-htpasswd
        spec:
          providerConfigRef:
            name: default
          deletionPolicy: Orphan
          forProvider:
            replication:
              - auto:
                  - {}
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: metadata.annotations["crossplane.io/external-name"]
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth-htpasswd"

    # -----------------------------------------------------------------------
    # 11. GSM SecretVersion — writes the htpasswd payload
    # -----------------------------------------------------------------------
    # Selects resource 10 via matchControllerRef (same XR) AND
    # matchLabels.purpose=basicauth-htpasswd, since resource 10b (the
    # plaintext-password container) is also a sibling GSM Secret and
    # matchControllerRef alone would be ambiguous.
    # Payload is read from the in-cluster K8s Secret produced by resource 9
    # (key `users` carries the `admin:$2a$...` htpasswd line).
    # deletionPolicy: Orphan keeps the version in GSM after XR deletion.
    - name: gsm-basicauth-secretversion
      base:
        apiVersion: secretmanager.gcp.upbound.io/v1beta1
        kind: SecretVersion
        spec:
          providerConfigRef:
            name: default
          deletionPolicy: Orphan
          forProvider:
            secretSelector:
              matchControllerRef: true
              matchLabels:
                purpose: basicauth-htpasswd
            secretDataSecretRef:
              namespace: crossplane-system
              # patched from spec.name → "tenant-<name>-htpasswd-source"
              name: ""
              key: users
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.secretDataSecretRef.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-htpasswd-source"

    # -----------------------------------------------------------------------
    # 10b. GSM Secret — plaintext password container
    # -----------------------------------------------------------------------
    # Parallel GSM container holding the plaintext BasicAuth password for
    # operator-side retrieval (see #76). Authenticated retrieval pattern:
    #   gcloud secrets versions access latest \
    #     --secret=tenant-<name>-basicauth-password
    # IAM on the GSM secret gates who can read; the operator hands the
    # plaintext to the tenant out-of-band (1Password, encrypted email).
    # Same Orphan + auto-replication contract as resource 10. The
    # `purpose` label disambiguates this from resource 10 when
    # resource 11b selects it via matchLabels.
    - name: gsm-basicauth-password-secret
      base:
        apiVersion: secretmanager.gcp.upbound.io/v1beta1
        kind: Secret
        metadata:
          labels:
            purpose: basicauth-password
        spec:
          providerConfigRef:
            name: default
          deletionPolicy: Orphan
          forProvider:
            replication:
              - auto:
                  - {}
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: metadata.annotations["crossplane.io/external-name"]
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth-password"

    # -----------------------------------------------------------------------
    # 11b. GSM SecretVersion — writes the plaintext password payload
    # -----------------------------------------------------------------------
    # Selects resource 10b via matchControllerRef + matchLabels (mirrors
    # resource 11's selection of resource 10). Payload is read from the
    # same in-cluster K8s Secret produced by resource 9, key `password`
    # (the plaintext generated by the ESO Password CR). Orphan deletion
    # mirrors resource 11.
    - name: gsm-basicauth-password-secretversion
      base:
        apiVersion: secretmanager.gcp.upbound.io/v1beta1
        kind: SecretVersion
        spec:
          providerConfigRef:
            name: default
          deletionPolicy: Orphan
          forProvider:
            secretSelector:
              matchControllerRef: true
              matchLabels:
                purpose: basicauth-password
            secretDataSecretRef:
              namespace: crossplane-system
              # patched from spec.name → "tenant-<name>-htpasswd-source"
              name: ""
              key: password
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.secretDataSecretRef.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-htpasswd-source"

    # -----------------------------------------------------------------------
    # 12. BasicAuth ExternalSecret — materialise htpasswd into tenant-ns
    # -----------------------------------------------------------------------
    # Pulls the htpasswd from GSM into a K8s Secret in the tenant namespace.
    # Key `users` (Traefik's BasicAuth Middleware contract); referenced by
    # resource 14.
    #
    # `refreshInterval: 5m` is the chosen fix for #107 (option A): the
    # tenant-NS ExternalSecret and the Crossplane SecretVersion that writes
    # the freshly bcrypted htpasswd to GSM reconcile in parallel with no
    # ordering guarantee. On cluster rebuild, ESO can read `:latest` from
    # GSM before Crossplane has written the new version, so this Secret
    # initially carries the orphan'd (pre-teardown) hash. The 5-minute
    # refresh keeps the catch-up window short — operators handing the new
    # GSM plaintext to a tenant owner see it accepted by Traefik within
    # five minutes of the rebuild, vs. up to 60 with the old 1h value.
    # See `platform-gitops#107` for the issue and the longer-term
    # ordering-fix options (dependsOn / forceSync) that would eliminate
    # the window entirely. Refresh also lets tenant-side password
    # rotations (manual GSM update) propagate without intervention,
    # which was the original 1h rationale.
    - name: basicauth-externalsecret
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                name: basicauth
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                refreshInterval: 5m
                secretStoreRef:
                  kind: ClusterSecretStore
                  name: gcp-secret-manager
                target:
                  # patched from spec.name → "tenant-<name>-basicauth"
                  name: ""
                  creationPolicy: Owner
                data:
                  - secretKey: users
                    remoteRef:
                      # patched from spec.name → "tenant-<name>-basicauth-htpasswd"
                      key: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.target.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.data[0].remoteRef.key
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth-htpasswd"

    # -----------------------------------------------------------------------
    # 13. GHCR-pull ExternalSecret — shared GSM entry → per-tenant dockerconfig
    # -----------------------------------------------------------------------
    # Materialises the shared GHCR pull credential into each tenant namespace
    # as a dockerconfigjson Secret named `ghcr-pull-secret`, consumed by the
    # Helm Release in S3-06 as imagePullSecret for the private frontend
    # image. The GSM source `shared-ghcr-pull-secret` is seeded once by the
    # bootstrap script — see INENI-PT-GROUP-B/platform-iac#55. Until that
    # entry exists in GSM this ExternalSecret stays in SecretSyncedError;
    # tenants without the seed cannot pull the frontend, but the rest of
    # the tenant namespace (BasicAuth, DB, backend) comes up regardless.
    # remoteRef.key is constant across tenants — no patch.
    - name: ghcr-pull-externalsecret
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                name: ghcr-pull
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                refreshInterval: 1h
                secretStoreRef:
                  kind: ClusterSecretStore
                  name: gcp-secret-manager
                target:
                  name: ghcr-pull-secret
                  creationPolicy: Owner
                  template:
                    type: kubernetes.io/dockerconfigjson
                    data:
                      .dockerconfigjson: "{{ .dockerconfigjson }}"
                data:
                  - secretKey: dockerconfigjson
                    remoteRef:
                      key: shared-ghcr-pull-secret
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 14. Traefik BasicAuth Middleware — wires the htpasswd Secret
    # -----------------------------------------------------------------------
    # References the K8s Secret produced by resource 12. The tenant Ingress
    # (S3-06) carries the annotation
    #   traefik.ingress.kubernetes.io/router.middlewares: tenant-<name>-basicauth@kubernetescrd
    # which Traefik resolves as `<namespace>-<name>@kubernetescrd` —
    # i.e. namespace `tenant-<name>` + Middleware name `basicauth`.
    - name: basicauth-middleware
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: traefik.io/v1alpha1
              kind: Middleware
              metadata:
                name: basicauth
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                basicAuth:
                  # patched from spec.name → "tenant-<name>-basicauth"
                  secret: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.basicAuth.secret
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth"

    # -----------------------------------------------------------------------
    # 15. Helm Release — the tenant app
    # -----------------------------------------------------------------------
    # Renders ghcr.io/ineni-pt-group-b/app-chart into the tenant namespace via
    # provider-helm (helm.crossplane.io/v1beta1 Release, ProviderConfig
    # `default`, InjectedIdentity — see crossplane/providers/
    # provider-config-helm.yaml). Chart is a public OCI artefact so no
    # `chart.pullSecretRef` is needed.
    #
    # Image-tag sourcing — three-layer precedence:
    #   1. Chart default (image.*.repository) — kept as chart concern, not
    #      overridden here.
    #   2. Central per-rollout tag — read from the ConfigMap `tenant-app-defaults`
    #      in crossplane-system via `set[].valueFrom.configMapKeyRef`. The
    #      ConfigMap mirrors `values/app-version.yaml` and is synced by the
    #      `tenant-app-defaults` Argo CD Application (applications/
    #      app-version-configmap.yaml). Bumping a rollout = one PR editing
    #      both files in lockstep.
    #   3. Per-tenant override — `spec.imageTagOverride.{backend,frontend}` on
    #      the claim. Applied as later `set[]` entries that beat the central
    #      tag for that one tenant; missing fields produce no patch and the
    #      central tag wins. The staging tenant uses this to receive new
    #      versions before the central rollout (architecture-decisions.md
    #      § Application updates and staging).
    #
    # `chart.version` is a CRD-required field on the Release; it cannot be
    # sourced from a ConfigMap and is fed by the patch from `spec.version` on
    # the claim. Tenants without a `version` override get the chart version
    # baked into the Composition base, which is bumped in the same PR as
    # values/app-version.yaml. (The ConfigMap mechanism for image tags is
    # used because `set[]` accepts `valueFrom` whereas `chart.version` does
    # not — see helm.crossplane.io_releases.yaml CRD schema.)
    #
    # rollbackLimit: 3 — Crossplane retries a failed Helm upgrade up to three
    # times by rolling back to the previous release before giving up. Matches
    # the per-tenant blast radius (one tenant stuck does not gate other
    # tenants).
    #
    # No NetworkPolicy / pull-secret / ingress concerns here — Resources 4-7
    # already cover the network rules, Resource 13 supplies `ghcr-pull-secret`
    # for the private frontend image (chart default `imagePullSecrets` already
    # points at that name), and the chart renders its own Ingress carrying the
    # BasicAuth middleware annotation patched below.
    #
    # Database: the chart consumes `db.secretName`, which points at the
    # CloudNativePG-generated credentials Secret next to the tenant `Cluster`.
    # The CNPG Cluster itself is provisioned by S3-04 (Resource 16 below). On
    # first reconcile the Release may briefly sit in a "secret not found"
    # state until CNPG materialises `<name>-cluster-app` — expected and
    # self-healing.
    - name: helm-release
      base:
        apiVersion: helm.crossplane.io/v1beta1
        kind: Release
        spec:
          providerConfigRef:
            name: default
          rollbackLimit: 3
          forProvider:
            # patched from spec.name → "tenant-<name>"
            namespace: ""
            chart:
              name: app-chart
              repository: oci://ghcr.io/ineni-pt-group-b
              # patched from spec.version when set; falls back to the value
              # baked here, which is bumped in lockstep with
              # values/app-version.yaml.
              version: "0.1.1"
            values:
              # patched from spec.name (verbatim)
              tenant: ""
              # patched from spec.name → "<name>.fhuebung.lol"
              host: ""
              db:
                # patched from spec.name → "<name>-cluster-app"
                # (CloudNativePG-generated credentials Secret; created by S3-04)
                secretName: ""
              ingress:
                # patched from spec.name →
                #   "tenant-<name>-basicauth@kubernetescrd"
                # (matches Middleware created by Resource 14)
                basicAuthMiddlewareRef: ""
            set:
              # Central image tags from `tenant-app-defaults` ConfigMap. The
              # per-tenant override entries — if any — are appended at
              # set[2]/set[3] by the patches below (policy.fromFieldPath:
              # Optional). Entry order matters: provider-helm applies set[]
              # in declaration order, so a later entry for the same key
              # wins. Empty placeholders are NOT allowed here —
              # provider-helm's composeValuesFromSpec rejects any Set entry
              # with Value=="" && ValueFrom==nil with `errMissingValueForSet`
              # (pkg/controller/cluster/release/values.go:79-81 @ v1.2.0).
              - name: image.backend.tag
                valueFrom:
                  configMapKeyRef:
                    name: tenant-app-defaults
                    namespace: crossplane-system
                    key: backend
              - name: image.frontend.tag
                valueFrom:
                  configMapKeyRef:
                    name: tenant-app-defaults
                    namespace: crossplane-system
                    key: frontend
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.values.tenant
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.values.host
          transforms:
            - type: string
              string:
                fmt: "%s.fhuebung.lol"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.values.db.secretName
          transforms:
            - type: string
              string:
                fmt: "%s-cluster-app"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.values.ingress.basicAuthMiddlewareRef
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth@kubernetescrd"
        # Per-tenant chart-version override (optional). Missing source = no-op
        # → the chart.version baked into base wins.
        - type: FromCompositeFieldPath
          fromFieldPath: spec.version
          toFieldPath: spec.forProvider.chart.version
        # Per-tenant image-tag overrides. Append a fresh set[] entry at
        # index 2 (backend) or 3 (frontend) only when the override is set on
        # the claim. The pattern is: one patch creates `name` (a constant
        # string via the Format transform, gated by the same source), the
        # other creates `value`. Both carry policy.fromFieldPath: Optional,
        # so a missing source skips them silently — no half-formed Set entry
        # is materialised and provider-helm never sees an entry with
        # Value=="" (which would trigger errMissingValueForSet, see set[]
        # comment in base).
        - type: FromCompositeFieldPath
          fromFieldPath: spec.imageTagOverride.backend
          toFieldPath: spec.forProvider.set[2].name
          policy:
            fromFieldPath: Optional
          transforms:
            - type: string
              string:
                fmt: "image.backend.tag%.0s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.imageTagOverride.backend
          toFieldPath: spec.forProvider.set[2].value
          policy:
            fromFieldPath: Optional
        - type: FromCompositeFieldPath
          fromFieldPath: spec.imageTagOverride.frontend
          toFieldPath: spec.forProvider.set[3].name
          policy:
            fromFieldPath: Optional
          transforms:
            - type: string
              string:
                fmt: "image.frontend.tag%.0s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.imageTagOverride.frontend
          toFieldPath: spec.forProvider.set[3].value
          policy:
            fromFieldPath: Optional

    # -----------------------------------------------------------------------
    # 16. CloudNativePG Cluster — per-tenant PostgreSQL (S3-04)
    # -----------------------------------------------------------------------
    # Single-instance Postgres for the tenant app. The Cluster lives in
    # namespace `tenant-<name>`, but its NAME resolves to `<spec.name>-cluster`
    # (no `tenant-` prefix). This is a hard cross-task contract: CNPG derives
    # the app-user credentials Secret as `<clusterName>-app`, and the S3-06
    # Helm Release (Resource 15, #47) patches `db.secretName` to
    # `<spec.name>-cluster-app`. Naming the Cluster `tenant-<name>-cluster`
    # would silently break the backend's DB credential lookup. Hence
    # `fmt: "%s-cluster"` on the name, not the `tenant-%s` used by the
    # namespace-scoped resources above.
    #
    # The default initdb bootstrap creates database `app` owned by role `app`
    # and generates the `<name>-cluster-app` Secret. That Secret carries a
    # ready-made `uri` key (a full postgresql:// connection string); the
    # chart's backend Deployment reads `DATABASE_URL` from it via
    # `db.urlKey: uri` (app-backend/chart/values.yaml) — no URL assembly is
    # needed on either side.
    #
    # Resources are set explicitly, not inherited: the namespace ResourceQuota
    # forces requests/limits, and without this block the LimitRange (Resource
    # 3) would inject the small-tier 256Mi container default — too tight for
    # Postgres and OOM-prone under load. 512Mi/500m equals the small-tier
    # per-container max and stays within the medium max too, so no tier-map
    # patch is needed; the aggregate (CNPG + backend + frontend) fits the
    # small quota's 2Gi / 2cpu.
    #
    # Storage: 8Gi on `premium-rwo` (GKE SSD) — within the small tier's
    # requests.storage (10Gi) / persistentvolumeclaims (2) quota.
    #
    # Lifecycle: the Object keeps the default deletionPolicy (Delete), so
    # deleting the XR tears down the Cluster, its PVC and the data — the
    # intended behaviour for ephemeral tenants (it follows the namespace
    # away). Unlike the Orphan'd GSM entries, tenant DB data is NOT preserved
    # across an XR delete + recreate; relevant to the recovery drills in
    # INENI-PT-GROUP-B/platform-gitops#64 / #65.
    #
    # Backups (#67): the `backup:` stanza ships Barman base backups + WAL
    # archiving to gs://dotted-axle-495612-f4-pg-backups/<name>/. The write
    # credential is Workload Identity Federation *direct resource access*:
    # `googleCredentials.gkeEnvironment: true` makes Barman use the pod's
    # ambient ADC, and Resource 17 grants the instance KSA's federated
    # principal objectAdmin on the bucket — no per-tenant GSA, no
    # `iam.gke.io/gcp-service-account` annotation, no static key. CNPG names
    # the instance KSA after the Cluster (`<name>-cluster`), which is the
    # subject in Resource 17's principal string.
    # `retentionPolicy: 14d` lets Barman prune its own catalog well before
    # the bucket's 30-day lifecycle delete (terraform/backup) reaps stragglers;
    # the lifecycle rule is a cost backstop, not the retention mechanism.
    # Egress: the GCS HTTPS path is already covered by Resource 5's
    # TCP-443-anywhere allow (its comment anticipated exactly this).
    # In-tree Barman support is deprecated upstream (removal slated for CNPG
    # 1.30; we pin operator 1.29.1 via chart 0.28.2) — the Barman Cloud
    # CNPG-I plugin migration is out of scope for the project window,
    # mirroring the Crossplane-2.x pinning decision.
    - name: cnpg-cluster
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: postgresql.cnpg.io/v1
              kind: Cluster
              metadata:
                # patched from spec.name → "<name>-cluster"
                name: ""
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                instances: 1
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
                storage:
                  size: 8Gi
                  storageClass: premium-rwo
                backup:
                  retentionPolicy: "14d"
                  barmanObjectStore:
                    # patched from spec.name → "gs://<bucket>/<name>/"
                    destinationPath: ""
                    googleCredentials:
                      gkeEnvironment: true
                    wal:
                      compression: gzip
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "%s-cluster"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.backup.barmanObjectStore.destinationPath
          transforms:
            - type: string
              string:
                fmt: "gs://dotted-axle-495612-f4-pg-backups/%s/"

    # -----------------------------------------------------------------------
    # 17. GCS bucket IAM — per-tenant backup write access (#67)
    # -----------------------------------------------------------------------
    # Grants the CNPG instance KSA (`tenant-<name>/<name>-cluster`) direct
    # Workload Identity Federation access to the shared pg-backups bucket —
    # the `principal://` member names the KSA itself, with no intermediate
    # GSA and no SA-JSON key. Reconciled by provider-gcp-storage, whose
    # controller impersonates the crossplane-provider-gcp GSA; that GSA holds
    # only the pgBackupsBucketIamAdmin custom role on this one bucket
    # (terraform/backup), so it can edit bindings but never read objects.
    #
    # The IAM condition scopes objectAdmin to the tenant's own "<name>/"
    # prefix. The second clause is required for listing: objects.list is
    # checked against the *bucket* resource name, so the prefix clause alone
    # would deny it — `objectListPrefix` admits list calls whose prefix
    # parameter stays inside the tenant prefix (Barman always lists with its
    # destination prefix). Default deletionPolicy (Delete): the binding is
    # removed when the tenant is offboarded; the objects themselves are
    # Orphan-equivalent (lifecycle reaps them after 30 days).
    - name: pg-backups-bucket-iam
      base:
        apiVersion: storage.gcp.upbound.io/v1beta1
        kind: BucketIAMMember
        spec:
          providerConfigRef:
            name: default
          forProvider:
            bucket: dotted-axle-495612-f4-pg-backups
            role: roles/storage.objectAdmin
            # member + condition.expression patched from spec.name
            member: ""
            condition:
              - title: tenant-prefix-only
                description: >-
                  Limit object access to the tenant's own backup prefix;
                  allow listing only under that prefix.
                expression: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.member
          transforms:
            - type: string
              string:
                fmt: >-
                  principal://iam.googleapis.com/projects/519758945793/locations/global/workloadIdentityPools/dotted-axle-495612-f4.svc.id.goog/subject/ns/tenant-%[1]s/sa/%[1]s-cluster
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.condition[0].expression
          transforms:
            - type: string
              string:
                fmt: >-
                  resource.name.startsWith('projects/_/buckets/dotted-axle-495612-f4-pg-backups/objects/%[1]s/')
                  || api.getAttribute('storage.googleapis.com/objectListPrefix',
                  '').startsWith('%[1]s/')

    # -----------------------------------------------------------------------
    # 18. CNPG ScheduledBackup — daily base backup (#67)
    # -----------------------------------------------------------------------
    # Daily base backup at 02:00 UTC (CNPG cron has a seconds field, hence
    # six entries). `immediate: true` takes the first base backup as soon as
    # the schedule object lands, so WAL archiving has a base to apply to
    # without waiting a day. `backupOwnerReference: self` ties Backup objects
    # to the ScheduledBackup, keeping `kubectl get backups` tidy per tenant.
    - name: cnpg-scheduled-backup
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: postgresql.cnpg.io/v1
              kind: ScheduledBackup
              metadata:
                # patched from spec.name → "<name>-cluster-daily"
                name: ""
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                schedule: "0 0 2 * * *"
                backupOwnerReference: self
                immediate: true
                cluster:
                  # patched from spec.name → "<name>-cluster"
                  name: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "%s-cluster-daily"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.cluster.name
          transforms:
            - type: string
              string:
                fmt: "%s-cluster"
