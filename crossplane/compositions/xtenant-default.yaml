---
# Composition: xtenant-default
#
# First Composition implementing the XTenant XRD. Shared file: subsequent
# Sprint 3 tasks (S3-03 NetworkPolicies, S3-04 CloudNativePG, S3-05 BasicAuth,
# S3-06 Helm Release) extend the same resources[] list rather than adding new
# Composition files — Crossplane v1.x P&T selects at most one Composition per
# XR by default, so a separate file would shadow this one.
#
# This file ships:
#   - S3-02 base resources: Namespace (tenant-<spec.name>), ResourceQuota
#     (tier-dependent quantities), LimitRange (per-container defaults; max
#     tier-dependent).
#   - S3-03 NetworkPolicies (per tenant): default-deny ingress, default-deny
#     egress with DNS allow to kube-system, permissive in-namespace app ↔ DB
#     on TCP 5432, and allow ingress from the traefik namespace to app pods
#     on TCP 80 / 3000.
#   - S3-05 BasicAuth + GHCR pull: ESO Password generator + Sprig htpasswd
#     ExternalSecret (crossplane-system) → Crossplane Secret + SecretVersion
#     via provider-gcp-secretmanager (GSM `tenant-<spec.name>-basicauth-htpasswd`)
#     → ExternalSecret in tenant-ns materialising the K8s Secret with the
#     `users` key → Traefik BasicAuth Middleware referencing it. A second
#     ExternalSecret materialises the shared `shared-ghcr-pull-secret` from
#     GSM into each tenant-ns as `ghcr-pull-secret` (dockerconfigjson) for
#     the private frontend image pull. The shared GSM entry is seeded by
#     INENI-PT-GROUP-B/platform-iac#55.
#
# All Kubernetes resources are rendered via provider-kubernetes
# (kubernetes.crossplane.io/v1alpha2 Object) using ProviderConfig "default"
# (InjectedIdentity, cluster-admin RBAC; see crossplane/providers/
# provider-config-kubernetes.yaml). The S3-05 GSM Secret + SecretVersion
# use provider-gcp-secretmanager directly via its
# `secretmanager.gcp.upbound.io` CRDs (architecture-decisions.md § Crossplane
# providers states `secret.gcp.upbound.io` — that's the wrong subdomain;
# verified against v2.5.0 source examples and noted in the follow-up
# doc-sync PR), authenticated through the `provider-gcp` DRC's KSA / GSA
# pair set up in S1-08 + S2-10.
#
# Tier semantics: spec.tier (small|medium) drives the ResourceQuota quantities
# and LimitRange.max per container; defaultRequest/default/min stay constant
# across tiers. See platform/docs/claude/architecture-decisions.md
# § Multi-tenancy § Tiering and platform-gitops#38 scope.
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xtenant-default
  labels:
    crossplane.io/xrd: xtenants.platform.fhuebung.lol
spec:
  compositeTypeRef:
    apiVersion: platform.fhuebung.lol/v1alpha1
    kind: XTenant

  resources:
    # -----------------------------------------------------------------------
    # 1. Namespace `tenant-<spec.name>`
    # -----------------------------------------------------------------------
    - name: namespace
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: v1
              kind: Namespace
              metadata:
                # patched from spec.name → "tenant-<name>"
                name: ""
                labels:
                  # patched from spec.name (verbatim, no transform)
                  platform.fhuebung.lol/tenant: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.labels["platform.fhuebung.lol/tenant"]

    # -----------------------------------------------------------------------
    # 2. ResourceQuota — tier-mapped namespace-level caps
    # -----------------------------------------------------------------------
    - name: resource-quota
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: v1
              kind: ResourceQuota
              metadata:
                name: tenant-quota
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                # Base values mirror the small tier; medium overrides via
                # tier-map patches below.
                hard:
                  requests.cpu: "1"
                  requests.memory: 1Gi
                  limits.cpu: "2"
                  limits.memory: 2Gi
                  pods: "10"
                  persistentvolumeclaims: "2"
                  requests.storage: 10Gi
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["requests.cpu"]
          transforms:
            - type: map
              map:
                small: "1"
                medium: "4"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["requests.memory"]
          transforms:
            - type: map
              map:
                small: 1Gi
                medium: 4Gi
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["limits.cpu"]
          transforms:
            - type: map
              map:
                small: "2"
                medium: "8"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["limits.memory"]
          transforms:
            - type: map
              map:
                small: 2Gi
                medium: 8Gi
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["pods"]
          transforms:
            - type: map
              map:
                small: "10"
                medium: "30"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["persistentvolumeclaims"]
          transforms:
            - type: map
              map:
                small: "2"
                medium: "5"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.hard["requests.storage"]
          transforms:
            - type: map
              map:
                small: 10Gi
                medium: 30Gi

    # -----------------------------------------------------------------------
    # 3. LimitRange — per-container defaults; max tier-dependent
    # -----------------------------------------------------------------------
    # defaultRequest/default/min are constant across tiers; only max varies.
    # Chart pods set their own resources explicitly, so these defaults act as
    # a safety net for ad-hoc pods that don't.
    - name: limit-range
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: v1
              kind: LimitRange
              metadata:
                name: tenant-limits
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                limits:
                  - type: Container
                    defaultRequest:
                      cpu: 50m
                      memory: 64Mi
                    default:
                      cpu: 250m
                      memory: 256Mi
                    min:
                      cpu: 10m
                      memory: 32Mi
                    # Base values mirror the small tier; medium overrides via
                    # tier-map patches below.
                    max:
                      cpu: 500m
                      memory: 512Mi
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.limits[0].max.cpu
          transforms:
            - type: map
              map:
                small: 500m
                medium: "1"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.tier
          toFieldPath: spec.forProvider.manifest.spec.limits[0].max.memory
          transforms:
            - type: map
              map:
                small: 512Mi
                medium: 1Gi

    # -----------------------------------------------------------------------
    # 4. NetworkPolicy — default-deny ingress
    # -----------------------------------------------------------------------
    # Empty podSelector matches all pods in the namespace. No ingress rules
    # = implicit deny for all inbound traffic. Inbound is unlocked
    # selectively by Resources 6 (in-namespace 5432) and 7 (Traefik → app).
    - name: netpol-default-deny-ingress
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: default-deny-ingress
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 5. NetworkPolicy — default-deny egress + DNS allow to kube-system
    # -----------------------------------------------------------------------
    # All egress denied except DNS resolution against CoreDNS in kube-system.
    # Without this allow, in-cluster service discovery (e.g. the CNPG cluster
    # service hostname) would break. DB pod egress to GCS for CNPG backups
    # is owned by S3-04 — added there with the correct pod selector.
    - name: netpol-default-deny-egress-allow-dns
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: default-deny-egress-allow-dns
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector: {}
                policyTypes:
                  - Egress
                egress:
                  - to:
                      - namespaceSelector:
                          matchLabels:
                            kubernetes.io/metadata.name: kube-system
                    ports:
                      - protocol: UDP
                        port: 53
                      - protocol: TCP
                        port: 53
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 6. NetworkPolicy — allow app ↔ DB on TCP 5432 inside the namespace
    # -----------------------------------------------------------------------
    # Permissive cross-cut: any pod in tenant-<name> can reach any other pod
    # in the same namespace on TCP 5432. Safe under soft multi-tenancy
    # because the only listener on 5432 in the namespace is the CNPG cluster
    # Service. Decouples this task from S3-04's eventual DB pod-selector
    # convention; a cleanup follow-up can tighten with cnpg.io/cluster=...
    # labels once S3-04 lands.
    - name: netpol-allow-app-to-db
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: allow-app-to-db
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
                  - Egress
                ingress:
                  - from:
                      - podSelector: {}
                    ports:
                      - protocol: TCP
                        port: 5432
                egress:
                  - to:
                      - podSelector: {}
                    ports:
                      - protocol: TCP
                        port: 5432
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 7. NetworkPolicy — allow ingress from the traefik namespace to app pods
    # -----------------------------------------------------------------------
    # Traefik (in the `traefik` namespace) terminates ingress and reaches app
    # pods on the chart's service ports: TCP 80 (frontend), TCP 3000
    # (backend). Port 5432 is intentionally absent — Traefik never reaches
    # the DB even though the pod selector is empty.
    - name: netpol-allow-traefik-to-app
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: networking.k8s.io/v1
              kind: NetworkPolicy
              metadata:
                name: allow-traefik-to-app
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                podSelector: {}
                policyTypes:
                  - Ingress
                ingress:
                  - from:
                      - namespaceSelector:
                          matchLabels:
                            kubernetes.io/metadata.name: traefik
                    ports:
                      - protocol: TCP
                        port: 80
                      - protocol: TCP
                        port: 3000
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 8. Password generator — ESO Password CR in crossplane-system
    # -----------------------------------------------------------------------
    # Config CR consumed by resource 9 via dataFrom.sourceRef. ESO calls the
    # generator at ExternalSecret reconciliation time to produce a `password`
    # key in the template context — the Password CR itself does not own a
    # separate K8s Secret. Resource 9's Sprig htpasswd template then hashes
    # that value into the htpasswd line stored in the target Secret.
    #
    # Re-onboarding a tenant (XR delete + recreate) or rebuilding the cluster
    # produces a fresh random password — accepted trade-off, since the ADR
    # § Secrets management does not promise persistence for the BasicAuth
    # secret (unlike the DNS zone or state bucket). length 32 / no symbols
    # is a deliberate choice for log-readability; bcrypt caps input at 72
    # bytes so deeper headroom is unnecessary.
    - name: basicauth-password-generator
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: generators.external-secrets.io/v1alpha1
              kind: Password
              metadata:
                # patched from spec.name → "tenant-<name>-password-gen"
                name: ""
                namespace: crossplane-system
              spec:
                length: 32
                digits: 8
                symbols: 0
                noUpper: false
                allowRepeat: true
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-password-gen"

    # -----------------------------------------------------------------------
    # 9. htpasswd ExternalSecret — bcrypt via Sprig htpasswd template
    # -----------------------------------------------------------------------
    # Consumes the Password generator from resource 8 (key `password`) and
    # renders the htpasswd line `admin:$2a$...` into a K8s Secret with the
    # `users` key — the format Traefik's BasicAuth Middleware expects.
    # This Secret in crossplane-system is the source resource 11 reads to
    # write the SecretVersion into GSM. ESO templates expose the full Sprig
    # function set; `htpasswd "user" "pwd"` is Sprig's bcrypt-hashed htpasswd
    # generator (returns the `user:$2a$10$...` line directly).
    # refreshInterval 0 = run once; the generator's output only changes on
    # cluster rebuild, refreshing here would be wasted work.
    - name: basicauth-htpasswd-source
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                # patched from spec.name → "tenant-<name>-htpasswd-source"
                name: ""
                namespace: crossplane-system
              spec:
                refreshInterval: "0"
                target:
                  # patched from spec.name → "tenant-<name>-htpasswd-source"
                  name: ""
                  creationPolicy: Owner
                  template:
                    engineVersion: v2
                    data:
                      users: |-
                        {{ htpasswd "admin" .password "bcrypt" }}
                dataFrom:
                  - sourceRef:
                      generatorRef:
                        apiVersion: generators.external-secrets.io/v1alpha1
                        kind: Password
                        # patched from spec.name → "tenant-<name>-password-gen"
                        name: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-htpasswd-source"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.target.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-htpasswd-source"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.dataFrom[0].sourceRef.generatorRef.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-password-gen"

    # -----------------------------------------------------------------------
    # 10. GSM Secret — container (provider-gcp-secretmanager)
    # -----------------------------------------------------------------------
    # Creates the Google Secret Manager secret container that holds the
    # tenant's htpasswd. Idempotent by external-name: a cluster rebuild
    # re-adopts the existing GSM container instead of recreating it.
    # deletionPolicy: Orphan keeps the GSM container after the XR is deleted,
    # so a re-onboarded tenant of the same name can be granted a fresh
    # password version without losing audit history. Replication: automatic
    # (Google chooses regions) — the v1beta1 CRD spells this as
    # `replication[].auto: [{}]`; v1beta2 uses a flat `replication.automatic`
    # form. We stay on v1beta1 because its `secretDataSecretRef` shape on
    # the SecretVersion is the verified contract.
    # GSM secret IDs must match `^[a-zA-Z][a-zA-Z0-9_-]{0,254}$` — slashes
    # are not allowed, so the documented `tenant-<name>/basicauth-htpasswd`
    # form is realised with dashes here; doc-sync PR to follow.
    - name: gsm-basicauth-secret
      base:
        apiVersion: secretmanager.gcp.upbound.io/v1beta1
        kind: Secret
        spec:
          providerConfigRef:
            name: default
          deletionPolicy: Orphan
          forProvider:
            replication:
              - auto:
                  - {}
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: metadata.annotations["crossplane.io/external-name"]
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth-htpasswd"

    # -----------------------------------------------------------------------
    # 11. GSM SecretVersion — writes the htpasswd payload
    # -----------------------------------------------------------------------
    # Sibling-resource ref via matchControllerRef:true selects the GSM
    # Secret (resource 10) created by the same XR — no name patch needed.
    # Payload is read from the in-cluster K8s Secret produced by resource 9
    # (key `users` carries the `admin:$2a$...` htpasswd line).
    # deletionPolicy: Orphan keeps the version in GSM after XR deletion.
    - name: gsm-basicauth-secretversion
      base:
        apiVersion: secretmanager.gcp.upbound.io/v1beta1
        kind: SecretVersion
        spec:
          providerConfigRef:
            name: default
          deletionPolicy: Orphan
          forProvider:
            secretSelector:
              matchControllerRef: true
            secretDataSecretRef:
              namespace: crossplane-system
              # patched from spec.name → "tenant-<name>-htpasswd-source"
              name: ""
              key: users
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.secretDataSecretRef.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-htpasswd-source"

    # -----------------------------------------------------------------------
    # 12. BasicAuth ExternalSecret — materialise htpasswd into tenant-ns
    # -----------------------------------------------------------------------
    # Pulls the htpasswd from GSM into a K8s Secret in the tenant namespace.
    # Key `users` (Traefik's BasicAuth Middleware contract); referenced by
    # resource 14. Refresh hourly so a tenant-side password rotation (manual
    # GSM update) propagates without intervention.
    - name: basicauth-externalsecret
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                name: basicauth
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                refreshInterval: 1h
                secretStoreRef:
                  kind: ClusterSecretStore
                  name: gcp-secret-manager
                target:
                  # patched from spec.name → "tenant-<name>-basicauth"
                  name: ""
                  creationPolicy: Owner
                data:
                  - secretKey: users
                    remoteRef:
                      # patched from spec.name → "tenant-<name>-basicauth-htpasswd"
                      key: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.target.name
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.data[0].remoteRef.key
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth-htpasswd"

    # -----------------------------------------------------------------------
    # 13. GHCR-pull ExternalSecret — shared GSM entry → per-tenant dockerconfig
    # -----------------------------------------------------------------------
    # Materialises the shared GHCR pull credential into each tenant namespace
    # as a dockerconfigjson Secret named `ghcr-pull-secret`, consumed by the
    # Helm Release in S3-06 as imagePullSecret for the private frontend
    # image. The GSM source `shared-ghcr-pull-secret` is seeded once by the
    # bootstrap script — see INENI-PT-GROUP-B/platform-iac#55. Until that
    # entry exists in GSM this ExternalSecret stays in SecretSyncedError;
    # tenants without the seed cannot pull the frontend, but the rest of
    # the tenant namespace (BasicAuth, DB, backend) comes up regardless.
    # remoteRef.key is constant across tenants — no patch.
    - name: ghcr-pull-externalsecret
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: external-secrets.io/v1
              kind: ExternalSecret
              metadata:
                name: ghcr-pull
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                refreshInterval: 1h
                secretStoreRef:
                  kind: ClusterSecretStore
                  name: gcp-secret-manager
                target:
                  name: ghcr-pull-secret
                  creationPolicy: Owner
                  template:
                    type: kubernetes.io/dockerconfigjson
                    data:
                      .dockerconfigjson: "{{ .dockerconfigjson }}"
                data:
                  - secretKey: dockerconfigjson
                    remoteRef:
                      key: shared-ghcr-pull-secret
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"

    # -----------------------------------------------------------------------
    # 14. Traefik BasicAuth Middleware — wires the htpasswd Secret
    # -----------------------------------------------------------------------
    # References the K8s Secret produced by resource 12. The tenant Ingress
    # (S3-06) carries the annotation
    #   traefik.ingress.kubernetes.io/router.middlewares: tenant-<name>-basicauth@kubernetescrd
    # which Traefik resolves as `<namespace>-<name>@kubernetescrd` —
    # i.e. namespace `tenant-<name>` + Middleware name `basicauth`.
    - name: basicauth-middleware
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha2
        kind: Object
        spec:
          providerConfigRef:
            name: default
          forProvider:
            manifest:
              apiVersion: traefik.io/v1alpha1
              kind: Middleware
              metadata:
                name: basicauth
                # patched from spec.name → "tenant-<name>"
                namespace: ""
              spec:
                basicAuth:
                  # patched from spec.name → "tenant-<name>-basicauth"
                  secret: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.metadata.namespace
          transforms:
            - type: string
              string:
                fmt: "tenant-%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.name
          toFieldPath: spec.forProvider.manifest.spec.basicAuth.secret
          transforms:
            - type: string
              string:
                fmt: "tenant-%s-basicauth"
