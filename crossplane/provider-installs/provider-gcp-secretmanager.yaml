---
# provider-gcp-secretmanager install.
#
# Sub-provider of the GCP family that manages Google Secret Manager resources
# (Secret + SecretVersion). Consumed by the per-tenant BasicAuth Composition in
# S3-05, which writes the htpasswd SecretVersion under
# tenant-<name>/basicauth-htpasswd; ESO then materialises it back into the
# tenant namespace as the Secret consumed by the Traefik Middleware.
#
# runtimeConfigRef points at the existing DeploymentRuntimeConfig provider-gcp
# (kept generic-named per Option A — see
# crossplane/providers/deployment-runtime-config-gcp.yaml for the inline
# note and platform/docs/claude/architecture-decisions.md § Crossplane
# providers — family layout for GCP for the full rationale). The DRC pins
# the controller ServiceAccount to provider-gcp, annotated for GKE Workload
# Identity against the GSA created in platform-iac/terraform/iam.
#
# No manual ClusterRoleBinding here. Unlike provider-helm and provider-kubernetes
# (which apply arbitrary cluster objects across tenant namespaces and need
# cluster-admin), provider-gcp-secretmanager only manages its own
# secret.gcp.upbound.io managed resources in-cluster — Crossplane's rbac-manager
# (rbacManager.replicas: 1 in values/crossplane.yaml) auto-grants those
# permissions to the controller ServiceAccount.
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-gcp-secretmanager
spec:
  package: xpkg.upbound.io/upbound/provider-gcp-secretmanager:v2.5.4
  packagePullPolicy: IfNotPresent
  revisionActivationPolicy: Automatic
  revisionHistoryLimit: 1
  runtimeConfigRef:
    name: provider-gcp
