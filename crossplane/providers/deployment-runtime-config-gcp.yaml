---
# DeploymentRuntimeConfig for provider-gcp.
#
# Pins the provider's controller ServiceAccount to a fixed name and annotates it
# for GKE Workload Identity, so provider-gcp authenticates to Google Secret
# Manager as the dedicated GSA without any JSON key.
#
# The GSA, its roles/secretmanager.secretVersionAdder binding, and the Workload
# Identity binding for crossplane-system/provider-gcp are created in platform-iac
# (terraform/iam). The serviceAccountTemplate name below must stay in sync with
# the iam module's crossplane_provider_gcp_ksa_name variable (default: provider-gcp).
#
# Naming note (Option A, #21): the resource name `provider-gcp` is intentionally
# generic. Under Upbound's family layout the controller pod ships in the
# sub-provider provider-gcp-secretmanager, which references this DRC via
# spec.runtimeConfigRef.name: provider-gcp. Crossplane's per-Provider ownership
# of the DRC serviceAccountTemplate (see crossplane/crossplane#4552) means this
# DRC is functionally owned by that sub-provider, even though the name does not
# declare it. Trade-off documented in
# platform/docs/claude/architecture-decisions.md § Crossplane providers —
# family layout for GCP.
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: provider-gcp
spec:
  serviceAccountTemplate:
    metadata:
      name: provider-gcp
      annotations:
        # The GSA email couples to the iam module's crossplane_provider_gcp_sa_id
        # and project_id; keep both in sync with terraform/iam if either changes.
        iam.gke.io/gcp-service-account: crossplane-provider-gcp@dotted-axle-495612-f4.iam.gserviceaccount.com
