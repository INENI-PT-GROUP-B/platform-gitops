---
# Argo CD Application syncing the Crossplane Provider installs in this repo
# (crossplane/provider-installs/provider-helm.yaml,
#  crossplane/provider-installs/provider-kubernetes.yaml).
#
# Picked up by the root App-of-Apps that watches applications/ (S2-02). The
# Provider CRs here depend on the pkg.crossplane.io CRDs installed by the
# Crossplane core Application (applications/crossplane.yaml).
# SkipDryRunOnMissingResource plus the retry and selfHeal policy let this app
# converge once those CRDs exist, instead of coupling it to a hard sync-wave.
# Same pattern as applications/crossplane-providerconfigs.yaml and
# applications/cert-manager-clusterissuers.yaml.
#
# provider-gcp is intentionally not installed here — its install ships in a
# focused follow-up PR after the Upjet family-vs-monolith package layout and
# the DeploymentRuntimeConfig naming are agreed on with Ronny (the DRC on main
# is named `provider-gcp`, which under the family approach would target the
# sub-provider that holds the controller pod).
#
# namespace (argocd), project (default) and repoURL must match the root
# App-of-Apps configured by the bootstrap (S2-02).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-providers
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
    targetRevision: main
    path: crossplane/provider-installs
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
