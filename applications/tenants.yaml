---
# Argo CD Application syncing the per-tenant XTenant claims in this repo
# (tenants/*.yaml — first claims added in S3-09, #62).
#
# Picked up by the root App-of-Apps that watches applications/ (S2-02). The
# claims depend on the XTenant CompositeResourceDefinition installed by the
# crossplane-xrds Application (#46) and on every component the Composition
# renders. SkipDryRunOnMissingResource plus the retry and selfHeal policy let
# this app converge once those dependencies exist, instead of coupling it to a
# hard sync-wave. Same pattern as applications/crossplane-xrds.yaml and
# applications/crossplane-compositions.yaml.
#
# destination.namespace pins the claims to crossplane-system (Claims are
# namespaced because claimNames.kind: Tenant in crossplane/xrds/xtenant.yaml).
# Each claim's metadata.namespace is left unset in tenants/*.yaml and resolved
# from this Application's destination — single source of truth for claim
# placement.
#
# namespace (argocd), project (default) and repoURL must match the root
# App-of-Apps configured by the bootstrap (S2-02).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenants
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
    targetRevision: main
    path: tenants
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
