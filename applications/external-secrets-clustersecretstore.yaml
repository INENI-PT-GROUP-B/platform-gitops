---
# Argo CD Application syncing the ESO ClusterSecretStore manifest in this repo
# (external-secrets/clustersecretstores/gcp-secret-manager.yaml).
#
# Picked up by the root App-of-Apps that watches applications/ (S2-02). The
# ClusterSecretStore here depends on the `ClusterSecretStore` CRD installed by
# the ESO install Application (applications/external-secrets.yaml).
# SkipDryRunOnMissingResource plus the retry and selfHeal policy let this app
# converge once that CRD exists, instead of coupling it to a hard sync-wave.
# Same pattern as applications/cert-manager-clusterissuers.yaml.
#
# namespace (argocd), project (default) and repoURL must match the root
# App-of-Apps configured by the bootstrap (S2-01).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-clustersecretstore
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
    targetRevision: main
    path: external-secrets/clustersecretstores
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
