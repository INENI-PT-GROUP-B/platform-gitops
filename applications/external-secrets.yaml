---
# Argo CD Application deploying the upstream External Secrets Operator (ESO)
# Helm chart with the platform values in values/external-secrets.yaml.
# Multi-source: the chart comes from its Helm repo, the values file from this
# git repo via the $values ref.
#
# Picked up by the root App-of-Apps that watches applications/ (S2-02). The
# chart version is pinned per the CI/tooling version-pinning convention;
# upgrades go through an explicit PR.
#
# ESO syncs secrets from Google Secret Manager into Kubernetes Secret objects,
# authenticating as the `external-secrets` GSA via Workload Identity (no JSON
# key). The GSA, its WI binding for `external-secrets/external-secrets`, and the
# project-level roles/secretmanager.secretAccessor binding are provisioned by
# platform-iac (terraform/iam, S1-08).
#
# The ClusterSecretStore ships via the sibling Application
# applications/external-secrets-clustersecretstore.yaml, which depends on the
# CRDs installed here. ServerSideApply keeps the large ESO CRDs clear of the
# 256KB client-side annotation limit.
#
# namespace (argocd), project (default) and the git repoURL must match the root
# App-of-Apps configured by the bootstrap (S2-01).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.5.0
      helm:
        valueFiles:
          - $values/values/external-secrets.yaml
    - repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
