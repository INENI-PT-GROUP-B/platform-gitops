---
# Root App-of-Apps — the single Argo CD Application that watches applications/
# and reconciles every sibling Application in this directory (and itself).
#
# This file is the git-side source of truth for the root. The bootstrap applies
# an identical object once from platform-iac/bootstrap/argocd-bootstrap.yaml
# (S2-01, Phase 5); Argo CD then adopts it and reconciles it from here like any
# other component, closing the GitOps loop.
#
# CONTRACT WITH S2-01: the spec below MUST stay byte-for-byte equivalent to
# platform-iac/bootstrap/argocd-bootstrap.yaml. Any divergence leaves the root
# permanently OutOfSync — selfHeal would fight the bootstrap's apply on every
# re-run. The resources-finalizer makes deleting the root cascade-delete all
# child Applications and their resources.
#
# namespace (argocd), project (default) and repoURL must match the Argo CD
# install configured by the bootstrap (S2-01).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
    targetRevision: main
    path: applications
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
