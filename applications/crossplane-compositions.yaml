---
# Argo CD Application syncing the Crossplane Compositions in this repo
# (crossplane/compositions/ — first content added by S3-02 #38; subsequent
# Sprint 3 tasks S3-03 through S3-06 extend the same xtenant-default.yaml
# file rather than adding new Composition files, see #38 Notes).
#
# Picked up by the root App-of-Apps that watches applications/ (S2-02). The
# Compositions here depend on both the apiextensions.crossplane.io CRDs
# installed by the Crossplane core Application (applications/crossplane.yaml)
# and on the XRDs reconciled by applications/crossplane-xrds.yaml.
# SkipDryRunOnMissingResource plus the retry and selfHeal policy let this app
# converge once those exist, instead of coupling it to a hard sync-wave. Same
# pattern as applications/crossplane-providers.yaml,
# applications/crossplane-providerconfigs.yaml and
# applications/crossplane-xrds.yaml.
#
# The directory may be empty until #38 merges; Argo CD treats an empty source
# as in-sync.
#
# namespace (argocd), project (default) and repoURL must match the root
# App-of-Apps configured by the bootstrap (S2-02).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-compositions
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
    targetRevision: main
    path: crossplane/compositions
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      # Pairs with spec.ignoreDifferences below — without this option the
      # auto-sync engine ignores ignoreDifferences and keeps re-applying the
      # suppressed fields. Keep both together (see #111).
      - RespectIgnoreDifferences=true
  # Suppress CRD-default drift on the lone managed Composition
  # `xtenant-default`. The apiextensions.crossplane.io/v1 admission webhook
  # defaults two top-level spec fields server-side; the Git manifest does not
  # set them, so Argo CD's Git-vs-live differ flags them on every reconcile
  # and the Application stays OutOfSync forever (autoHealAttemptsCount hit
  # its hard limit on the live cluster). ServerSideApply=true does not help
  # here — the drift is applied-config vs effective-spec, not field-ownership.
  # Paired with RespectIgnoreDifferences=true in syncOptions above; do not
  # remove either half without re-reading #111. Composition is cluster-scoped,
  # so no namespace selector. The publishConnectionDetailsWithStoreConfigRef
  # pointer suppresses the entire block (not just .name) on purpose: Git sets
  # nothing under it, everything is CRD-default, and this survives future
  # default additions inside the same block without another patch.
  ignoreDifferences:
    - group: apiextensions.crossplane.io
      kind: Composition
      name: xtenant-default
      jsonPointers:
        - /spec/mode
        - /spec/publishConnectionDetailsWithStoreConfigRef
