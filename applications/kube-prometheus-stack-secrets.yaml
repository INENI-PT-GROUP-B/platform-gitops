---
# Argo CD Application syncing the monitoring-namespace ESO ExternalSecret(s) in
# this repo (monitoring/grafana-admin-externalsecret.yaml).
#
# Picked up by the root App-of-Apps that watches applications/ (S2-02). The
# ExternalSecret here depends on the external-secrets.io `ExternalSecret` CRD
# installed by the ESO install Application (applications/external-secrets.yaml)
# and on the `monitoring` namespace created by the kube-prometheus-stack install
# Application (applications/kube-prometheus-stack.yaml). SkipDryRunOnMissingResource
# plus the retry and selfHeal policy let this app converge once those exist,
# instead of coupling it to a hard sync-wave. CreateNamespace is set as a
# belt-and-braces guard so this app is order-independent of the stack install.
# Same pattern as applications/external-secrets-clustersecretstore.yaml.
#
# Kept separate from the kube-prometheus-stack chart-install Application so the
# secret's CRD-dependent sync policy does not gate the monitoring stack install.
#
# namespace (argocd), project (default) and repoURL must match the root
# App-of-Apps configured by the bootstrap (S2-02).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
    targetRevision: main
    path: monitoring
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
