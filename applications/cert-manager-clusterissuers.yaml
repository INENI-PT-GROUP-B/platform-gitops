---
# Argo CD Application syncing the cert-manager ClusterIssuer manifests in this
# repo (cert-manager/clusterissuers/letsencrypt-{staging,prod}.yaml).
#
# Picked up by the root App-of-Apps that watches applications/ (S2-02). The
# objects here depend on the cert-manager `ClusterIssuer` CRD installed by the
# cert-manager install Application (applications/cert-manager.yaml).
# SkipDryRunOnMissingResource plus the retry and selfHeal policy let this app
# converge once that CRD exists, instead of coupling it to a hard sync-wave.
# Same pattern as applications/crossplane-providerconfigs.yaml.
#
# namespace (argocd), project (default) and repoURL must match the root
# App-of-Apps configured by the bootstrap (S2-02).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-clusterissuers
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/INENI-PT-GROUP-B/platform-gitops.git
    targetRevision: main
    path: cert-manager/clusterissuers
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
